name: Bug report
description: Report reproducible incorrect behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Please report security-sensitive problems privately through SECURITY.md."
  - type: textarea
    id: behavior
    attributes:
      label: Actual behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include JavaScript, world setup, and Cable topology when relevant.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MineSIer version or commit
      placeholder: "e.g. main at abc1234"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: text
